<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tutor de Español</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>
  MathJax = { tex: { inlineMath:[['$','$']], displayMath:[['$$','$$']] }, svg: { fontCache:'global' } };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

<style>
/* ── TOKENS ──────────────────────────────────────────── */
:root {
  --bg:        #1A1712;
  --surface:   #231F18;
  --surface-2: #2C2720;
  --surface-3: #352F25;
  --border:    rgba(255,220,120,0.10);
  --border-2:  rgba(255,220,120,0.18);
  --gold:      #D4A843;
  --gold-dim:  #A07830;
  --gold-glow: rgba(212,168,67,0.15);
  --teal:      #4ECDC4;
  --teal-dim:  #2A9D94;
  --coral:     #E07B54;
  --sage:      #7BAE7F;
  --text:      #EDE0C8;
  --text-2:    #A89878;
  --text-3:    #6B5D48;
  --text-user: #F0C060;
  --text-note: #7FBFBA;
  --radius:    10px;
  --radius-sm: 6px;
  --font:      'Georgia', 'Times New Roman', serif;
  --font-ui:   'Segoe UI', system-ui, sans-serif;
  --font-mono: 'Courier New', monospace;
}

body.light {
  --bg:        #FAF6EE;
  --surface:   #FFFFFF;
  --surface-2: #F5EFE2;
  --surface-3: #EDE4D0;
  --border:    rgba(160,120,48,0.15);
  --border-2:  rgba(160,120,48,0.28);
  --gold:      #8A6010;
  --gold-dim:  #C49030;
  --gold-glow: rgba(138,96,16,0.08);
  --teal:      #1A7A72;
  --teal-dim:  #2A9D94;
  --coral:     #C0522A;
  --sage:      #3D7A42;
  --text:      #2A1F0E;
  --text-2:    #7A6040;
  --text-3:    #B09878;
  --text-user: #7A4800;
  --text-note: #1A6A64;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { height: 100%; }

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  height: 100%;
  /* mobile: use dvh so keyboard doesn't crush layout */
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
  /* prevent iOS rubber-band on body */
  overscroll-behavior: none;
}

/* ── HEADER ──────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border-2);
  padding: 0 16px;
  height: 50px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  /* safe area top for notched phones */
  padding-top: env(safe-area-inset-top);
  height: calc(50px + env(safe-area-inset-top));
}

.flag { font-size: 20px; line-height: 1; flex-shrink: 0; }

.header-title {
  font-family: var(--font);
  font-size: 17px;
  font-weight: normal;
  color: var(--gold);
  letter-spacing: 0.02em;
  white-space: nowrap;
}

/* hide subtitle on small screens */
.header-sub {
  font-size: 12px;
  color: var(--text-3);
  font-style: italic;
  white-space: nowrap;
}

.header-sep { flex: 1; min-width: 4px; }

.level-pill {
  font-size: 11px;
  font-weight: 600;
  color: var(--teal);
  background: rgba(78,205,196,0.10);
  border: 1px solid rgba(78,205,196,0.25);
  border-radius: 20px;
  padding: 3px 9px;
  letter-spacing: 0.03em;
  white-space: nowrap;
  flex-shrink: 0;
}

.header-btn {
  background: none;
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 12px;
  color: var(--text-2);
  cursor: pointer;
  font-family: var(--font-ui);
  white-space: nowrap;
  flex-shrink: 0;
  /* min touch target */
  min-height: 36px;
}

/* ── QUICK COMMANDS BAR ──────────────────────────────── */
.cmd-bar {
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  display: flex;
  gap: 6px;
  /* horizontal scroll on mobile — no wrapping */
  flex-wrap: nowrap;
  overflow-x: auto;
  overflow-y: hidden;
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cmd-bar::-webkit-scrollbar { display: none; }

.cmd-bar-label {
  font-size: 12px;
  color: var(--text-3);
  align-self: center;
  margin-right: 2px;
  flex-shrink: 0;
}

.cmd-chip {
  font-size: 13px;
  padding: 6px 13px;
  border: 1px solid var(--border-2);
  border-radius: 14px;
  color: var(--text-2);
  cursor: pointer;
  background: var(--surface);
  font-family: var(--font-ui);
  white-space: nowrap;
  flex-shrink: 0;
  /* comfortable touch target */
  min-height: 34px;
  display: flex;
  align-items: center;
  /* active state for touch */
  -webkit-user-select: none;
  user-select: none;
}

.cmd-chip:active {
  background: var(--gold-glow);
  border-color: var(--gold-dim);
  color: var(--gold);
}

.cmd-chip.story  { border-color: rgba(212,168,67,0.3);  color: var(--gold-dim); }
.cmd-chip.drill  { border-color: rgba(78,205,196,0.3);  color: var(--teal-dim); }
.cmd-chip.trans  { border-color: rgba(224,123,84,0.3);  color: var(--coral); }
.cmd-chip.vocab  { border-color: rgba(123,174,127,0.3); color: var(--sage); }

/* desktop hover */
@media (hover:hover) {
  .cmd-chip:hover { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold); }
  .header-btn:hover { background: var(--surface-2); color: var(--text); }
}

/* ── CHAT AREA ───────────────────────────────────────── */
#chat {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

/* ── MESSAGES ────────────────────────────────────────── */
.message {
  max-width: 820px;
  width: 100%;
  margin: 0 auto;
  padding: 12px 14px;
  border-radius: var(--radius);
  line-height: 1.75;
  font-size: 15px;
  animation: fadein 0.18s ease;
  /* prevent text overflow on narrow screens */
  word-break: break-word;
  overflow-wrap: break-word;
}

@keyframes fadein { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

.message.user {
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  color: var(--text-user);
  font-family: var(--font-ui);
  font-weight: 500;
  border-left: 3px solid var(--gold);
  align-self: flex-end;
  /* on mobile full width is fine */
  max-width: min(680px, 95%);
}

.message.bot {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.85;
  border-left: 3px solid var(--teal-dim);
}

.message.bot .words-note {
  display: inline-block;
  margin-top: 10px;
  padding: 5px 12px;
  background: rgba(212,168,67,0.08);
  border: 1px solid rgba(212,168,67,0.20);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--gold);
}

.message.bot em   { color: var(--text-note); font-style: italic; }
.message.bot strong { color: var(--gold); font-weight: 600; }

.message.bot .story-block {
  border-left: 3px solid var(--gold-dim);
  padding-left: 14px;
  margin: 8px 0;
  font-style: italic;
  color: var(--text);
  line-height: 2;
}

.message.bot .new-words {
  display: block;
  margin-top: 10px;
  padding: 8px 12px;
  background: rgba(78,205,196,0.06);
  border: 1px solid rgba(78,205,196,0.18);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--teal);
}

.message.bot .grammar-note {
  display: block;
  margin-top: 8px;
  padding: 8px 12px;
  background: rgba(224,123,84,0.06);
  border: 1px solid rgba(224,123,84,0.18);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--coral);
}

.message.loading {
  border: none;
  background: transparent;
  color: var(--text-3);
  font-style: italic;
  font-size: 14px;
  padding: 8px 14px;
  animation: pulse 1.4s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

.message.bot h1,.message.bot h2,.message.bot h3 {
  color: var(--gold);
  border-bottom: 1px solid var(--border-2);
  padding-bottom: 4px;
  margin: 16px 0 8px;
  font-family: var(--font);
  font-weight: normal;
}
.message.bot h1 { font-size: 18px; }
.message.bot h2 { font-size: 16px; }
.message.bot h3 { font-size: 14px; }
.message.bot p  { margin: 8px 0; }
.message.bot ul,.message.bot ol { margin: 8px 0 8px 18px; }
.message.bot li { margin: 4px 0; line-height: 1.6; }

/* tables scroll horizontally on mobile */
.message.bot .table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 12px 0;
}

.message.bot table {
  border-collapse: collapse;
  min-width: 100%;
  font-size: 13px;
  font-family: var(--font-ui);
}

.message.bot table td,.message.bot table th {
  border: 1px solid var(--border-2);
  padding: 7px 10px;
  white-space: nowrap;
}

.message.bot table th {
  background: var(--surface-2);
  color: var(--gold);
  font-weight: 600;
}

.message.bot table tr:nth-child(even) { background: var(--surface-2); }

.message.bot pre {
  background: #0F0D0A !important;
  border-left: 3px solid var(--teal-dim);
  padding: 12px;
  margin: 10px 0;
  overflow-x: auto;
  font-size: 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-2);
  font-family: var(--font-mono);
  -webkit-overflow-scrolling: touch;
}

.message.bot pre code { background: transparent !important; color: var(--text) !important; }
.message.bot code {
  color: var(--teal);
  font-family: var(--font-mono);
  background: var(--surface-2);
  padding: 2px 5px;
  border-radius: 3px;
  font-size: 12px;
}

.message.bot blockquote {
  border-left: 3px solid var(--gold-dim);
  padding-left: 14px;
  margin: 10px 0;
  color: var(--text-2);
  font-style: italic;
}

/* ── INPUT AREA ──────────────────────────────────────── */
.input-area {
  background: var(--surface);
  border-top: 1px solid var(--border-2);
  padding: 10px 12px;
  flex-shrink: 0;
  /* safe area bottom for iPhone home bar */
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
}

.input-row {
  display: flex;
  gap: 8px;
  max-width: 820px;
  margin: 0 auto;
  align-items: flex-end;
}

#input {
  flex: 1;
  padding: 10px 14px;
  font-size: 16px; /* 16px prevents iOS zoom on focus */
  font-family: var(--font-ui);
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border-2);
  border-radius: var(--radius);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  resize: none;
  line-height: 1.5;
  min-height: 44px;
  max-height: 120px;
  overflow-y: auto;
  /* iOS fix */
  -webkit-appearance: none;
  appearance: none;
}

#input:focus { border-color: var(--gold-dim); background: var(--surface-3); }
#input::placeholder { color: var(--text-3); font-style: italic; }

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: var(--radius);
  background: var(--gold);
  border: none;
  color: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
  touch-action: manipulation;
}
.send-btn:active { transform: scale(0.93); background: var(--gold-dim); }
.send-btn svg { width: 18px; height: 18px; }

/* hide clear button on mobile — save space, use header button instead */
.clear-btn {
  height: 44px;
  padding: 0 12px;
  border-radius: var(--radius);
  background: none;
  border: 1px solid var(--border-2);
  color: var(--text-3);
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font-ui);
  flex-shrink: 0;
  touch-action: manipulation;
}

/* hint hidden on mobile — no room */
.input-hint {
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  margin-top: 5px;
  font-style: italic;
  max-width: 820px;
  margin-left: auto;
  margin-right: auto;
}

/* ── CLICKABLE WORDS ─────────────────────────────────── */
.w {
  cursor: pointer;
  border-radius: 3px;
  padding: 2px 1px;   /* larger touch target */
  transition: background 0.1s;
  display: inline;
  -webkit-user-select: none;
  user-select: none;
}

.w:active, .w.selected {
  background: rgba(212,168,67,0.35);
  border-bottom: 1.5px solid var(--gold);
  color: var(--gold);
}

@media (hover:hover) {
  .w:hover { background: rgba(212,168,67,0.18); }
}

/* ── VOCAB TOOLBAR ───────────────────────────────────── */
#vocab-toolbar {
  position: fixed;
  bottom: calc(80px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface-3);
  border: 1px solid var(--gold-dim);
  border-radius: 22px;
  padding: 8px 10px 8px 16px;
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-2);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  z-index: 100;
  white-space: nowrap;
  /* don't exceed screen width on narrow phones */
  max-width: calc(100vw - 32px);
  animation: popIn 0.15s ease;
}

@keyframes popIn {
  from { opacity:0; transform:translateX(-50%) scale(0.92); }
  to   { opacity:1; transform:translateX(-50%) scale(1); }
}

#vocab-toolbar .selected-words {
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--gold);
  font-style: italic;
  font-size: 13px;
}

#vocab-toolbar .tb-add {
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 16px;
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-ui);
  touch-action: manipulation;
  white-space: nowrap;
}
#vocab-toolbar .tb-add:active { background: var(--gold-dim); }

#vocab-toolbar .tb-cancel {
  background: none;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  font-size: 20px;
  line-height: 1;
  padding: 4px 6px;
  touch-action: manipulation;
}

/* ── SCROLLBAR (desktop only) ────────────────────────── */
@media (hover:hover) {
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
}

/* ── DIVIDER ─────────────────────────────────────────── */
.turn-divider {
  max-width: 820px;
  width: 100%;
  margin: 2px auto;
  height: 1px;
  background: var(--border);
}

/* ── MOBILE OVERRIDES ────────────────────────────────── */
@media (max-width: 600px) {
  .header-sub { display: none; }         /* hide subtitle */
  .header-title { font-size: 16px; }
  #chat { padding: 12px 8px; }
  .message { padding: 10px 12px; font-size: 14px; }
  .message.bot { font-size: 15px; }
  .input-hint { display: none; }         /* hide hint — no room */
  .clear-btn { display: none; }          /* clear in header instead */
  #vocab-toolbar .selected-words { max-width: 100px; }
}

/* ── LANDSCAPE MOBILE ────────────────────────────────── */
@media (max-height: 500px) and (max-width: 900px) {
  .header { height: calc(42px + env(safe-area-inset-top)); }
  .cmd-bar { padding: 4px 10px; }
  .cmd-chip { padding: 4px 10px; font-size: 12px; min-height: 28px; }
  #chat { padding: 8px; }
  .input-area { padding: 6px 10px; padding-bottom: calc(6px + env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <span class="flag">🇪🇸</span>
  <span class="header-title">Tutor de Español</span>
  <span class="header-sub">· conversación con IA</span>
  <div class="header-sep"></div>
  <span class="level-pill">A2 · Alex</span>
  <button class="header-btn" onclick="toggleTheme()" id="theme-btn">☀ Light</button>
  <button class="header-btn" onclick="clearChat()">↺ Clear</button>
</header>

<!-- QUICK COMMAND BAR -->
<div class="cmd-bar">
  <span class="cmd-bar-label">Quick:</span>
  <button class="cmd-chip story" onclick="cmd('story')">📖 Story</button>
  <button class="cmd-chip drill" onclick="cmd('drill')">🎯 Drill</button>
  <button class="cmd-chip trans" onclick="cmd('translate')">🔄 Translate</button>
  <button class="cmd-chip vocab" onclick="cmd('vocab')">⭐ Vocab</button>
  <button class="cmd-chip"       onclick="cmd('explain')">📝 Explain</button>
  <button class="cmd-chip"       onclick="cmd('save')">💾 Save</button>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Escribe en español... or mix in English — no problem" autocomplete="off"></textarea>
    <button class="send-btn" onclick="send()" title="Send (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
    <button class="clear-btn" onclick="clearChat()">Clear</button>
  </div>
  <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line &nbsp;·&nbsp; ///palabra to add vocab &nbsp;·&nbsp; /story, /drill, /translate, /vocab, /explain</div>
</div>

<!-- VOCAB TOOLBAR -->
<div id="vocab-toolbar">
  <span>📌</span>
  <span class="selected-words" id="toolbar-words"></span>
  <button class="tb-add" id="toolbar-add-btn">Add to vocab</button>
  <button class="tb-cancel" onclick="clearWordSelection()" title="Cancel">✕</button>
</div>

<script>
// ── THEME ─────────────────────────────────────────────
function initTheme() {
  const t = localStorage.getItem('es_theme') || 'dark';
  document.body.classList.toggle('light', t === 'light');
  document.getElementById('theme-btn').textContent = t === 'light' ? '🌙 Dark' : '☀ Light';
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  const t = isLight ? 'light' : 'dark';
  localStorage.setItem('es_theme', t);
  document.getElementById('theme-btn').textContent = isLight ? '🌙 Dark' : '☀ Light';
}

// ── MARKED + MERMAID ──────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });
mermaid.initialize({ startOnLoad: true, theme: 'dark', securityLevel: 'loose' });

// ── STATE ─────────────────────────────────────────────
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sid = 'es_' + Math.random().toString(36).substr(2, 9);

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// ── RENDER ────────────────────────────────────────────
function renderMath() {
  if (window.MathJax?.typesetPromise) MathJax.typesetPromise().catch(() => {});
}

function postProcess(div, text) {
  // Highlight code blocks
  div.querySelectorAll('pre code').forEach(block => {
    if (!block.classList.contains('hljs')) {
      try {
        const lang = block.className.replace('language-', '');
        const hl = lang ? hljs.highlight(block.textContent, { language: lang, ignoreIllegals: true })
                        : hljs.highlightAuto(block.textContent);
        block.innerHTML = hl.value;
        block.classList.add('hljs');
      } catch (e) {}
    }
  });

  // Wrap tables for horizontal scroll on mobile
  div.querySelectorAll('table').forEach(table => {
    if (!table.parentElement.classList.contains('table-wrap')) {
      const wrap = document.createElement('div');
      wrap.className = 'table-wrap';
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    }
  });

  // Style "Words to remember:" line
  div.innerHTML = div.innerHTML.replace(
    /(Words to remember:[^\n<]+)/gi,
    '<span class="words-note">📌 $1</span>'
  );

  // Style "📖 New words:" line
  div.innerHTML = div.innerHTML.replace(
    /(📖 New words:[^\n<]+)/gi,
    '<span class="new-words">$1</span>'
  );

  // Style "🔤 Grammar note:" line
  div.innerHTML = div.innerHTML.replace(
    /(🔤 Grammar note:[^\n<]+)/gi,
    '<span class="grammar-note">$1</span>'
  );

  renderMath();
}

function addMessage(text, role) {
  // Divider between turns
  if (chat.children.length > 0) {
    const d = document.createElement('div');
    d.className = 'turn-divider';
    chat.appendChild(d);
  }
  const div = document.createElement('div');
  div.className = 'message ' + role;
  if (role === 'user') {
    div.textContent = text;
  } else {
    div.innerHTML = marked.parse(text);
    postProcess(div, text);
    setTimeout(() => makeWordsClickable(div), 100);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// ── SEND ──────────────────────────────────────────────
async function send() {
  let msg = input.value.trim();
  if (!msg) return;
  msg = expandVocabShortcut(msg);   // // shortcut rewrite
  addMessage(msg, 'user');
  input.value = '';
  input.style.height = 'auto';
  input.focus();

  const loading = document.createElement('div');
  loading.className = 'message loading';
  loading.textContent = 'Pensando...';
  chat.appendChild(loading);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch('/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sid, message: msg })
    });

    loading.remove();

    if (!res.ok) { addMessage('Error: ' + res.statusText, 'bot'); return; }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let text = '';
    const div = document.createElement('div');
    div.className = 'message bot';
    if (chat.children.length > 0) {
      const d = document.createElement('div'); d.className = 'turn-divider'; chat.appendChild(d);
    }
    chat.appendChild(div);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      text += decoder.decode(value);
      div.innerHTML = marked.parse(text);
      postProcess(div, text);
      chat.scrollTop = chat.scrollHeight;
    }

    // Final render passes + make words clickable
    setTimeout(() => {
      mermaid.contentLoaded();
      renderMath();
      makeWordsClickable(div);
    }, 220);

  } catch (err) {
    loading.remove();
    addMessage('Error: ' + err.message, 'bot');
  }
}

// ── CLEAR ─────────────────────────────────────────────
function clearChat() {
  fetch('/clear', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sid })
  });
  chat.innerHTML = '';
  addMessage('Sesión borrada. ¡Empecemos de nuevo! 🇪🇸', 'bot');
  input.focus();
}

// ── QUICK COMMANDS ────────────────────────────────────
function cmd(type) {
  const immediate = { drill:'/drill', vocab:'/vocab', save:'/save' };
  const fillIn    = { story:'/story ', translate:'/translate ', explain:'/explain ' };

  if (immediate[type]) {
    input.value = immediate[type];
    send();                          // fires straight away
  } else if (fillIn[type]) {
    input.value = fillIn[type];      // paste prefix, wait for topic
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
  }
}

// ── // VOCAB SHORTCUT detector ────────────────────────
// Intercepts "//word" before sending — rewrites as vocab note
function expandVocabShortcut(msg) {
  if (!msg.startsWith('///')) return msg;
  const word = msg.slice(3).trim();
  if (!word) return msg;
  return `///` + word;   // pass as-is — system prompt handles /// prefix
}

// ── WORD CLICK — multi-select vocab ──────────────────
let selectedWords = new Set();
const toolbar     = document.getElementById('vocab-toolbar');
const toolbarWords = document.getElementById('toolbar-words');

// Wrap every word in a bot bubble with a clickable span
// Called once after streaming finishes
function makeWordsClickable(div) {
  // Walk text nodes only — skip code blocks, spans already processed
  const walker = document.createTreeWalker(div, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      // Skip inside <code>, <pre>, .words-note, .new-words, .grammar-note
      let p = node.parentElement;
      while (p && p !== div) {
        if (['CODE','PRE'].includes(p.tagName) ||
            p.classList.contains('words-note') ||
            p.classList.contains('new-words') ||
            p.classList.contains('grammar-note')) return NodeFilter.FILTER_REJECT;
        p = p.parentElement;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });

  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);

  nodes.forEach(node => {
    const frag = document.createDocumentFragment();
    // Split on whitespace and punctuation boundaries
    const parts = node.textContent.split(/(\s+|(?=[,\.!?¡¿;:"""«»])|(?<=[,\.!?¡¿;:"""«»]))/);
    parts.forEach(part => {
      if (!part) return;
      // Only wrap actual word characters (letters including accented)
      if (/[a-záéíóúüñA-ZÁÉÍÓÚÜÑ]{2,}/.test(part)) {
        const span = document.createElement('span');
        span.className = 'w';
        span.textContent = part;
        span.addEventListener('click', onWordClick);
        frag.appendChild(span);
      } else {
        frag.appendChild(document.createTextNode(part));
      }
    });
    node.parentNode.replaceChild(frag, node);
  });
}

function onWordClick(e) {
  e.stopPropagation();
  const span = e.currentTarget;
  // Clean the word: lowercase, strip punctuation
  const word = span.textContent.trim().replace(/[^a-záéíóúüñA-ZÁÉÍÓÚÜÑ]/g, '').toLowerCase();
  if (!word) return;

  if (span.classList.contains('selected')) {
    span.classList.remove('selected');
    selectedWords.delete(word);
  } else {
    span.classList.add('selected');
    selectedWords.add(word);
  }
  updateToolbar();
}

function updateToolbar() {
  if (selectedWords.size === 0) {
    toolbar.style.display = 'none';
    return;
  }
  const words = [...selectedWords];
  toolbarWords.textContent = words.join(', ');
  const btn = document.getElementById('toolbar-add-btn');
  btn.textContent = `Add ${words.length} word${words.length > 1 ? 's' : ''} to vocab`;
  toolbar.style.display = 'flex';
}

function clearWordSelection() {
  selectedWords.clear();
  document.querySelectorAll('.w.selected').forEach(s => s.classList.remove('selected'));
  toolbar.style.display = 'none';
}

// Toolbar Add button — sends batch ///word1, word2, word3
document.getElementById('toolbar-add-btn').addEventListener('click', () => {
  if (!selectedWords.size) return;
  const words = [...selectedWords];
  const msg = '///' + words.join(', ');
  clearWordSelection();
  // Inject and send as user message
  input.value = msg;
  send();
});

// Click outside chat clears selection
document.addEventListener('click', e => {
  if (!e.target.classList.contains('w') && !toolbar.contains(e.target)) {
    clearWordSelection();
  }
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ── INIT ──────────────────────────────────────────────
initTheme();
input.focus();
addMessage('¡Hola Alex! 🇪🇸 Soy tu tutor de español. ¿Cómo estás hoy?\n\nPuedes escribir en español, mezclar con inglés — no hay problema. Usa los botones arriba para empezar una historia, un ejercicio, o simplemente charlar.', 'bot');
</script>
